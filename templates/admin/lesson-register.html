<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>レッスン管理カレンダー</title>


<!-- FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
    body {
        margin: 30px;
    }
    #calendar {
        max-width: 900px;
        margin: auto;
    }
</style>


</head>
<body>

<h2 class="text-center mb-4">レッスン管理カレンダー</h2>

<p th:if="${errorMessage}" th:text="${errorMessage}"></p>
<p th:if="${successMessage}" th:text="${successMessage}"></p>

<!-- <ul>
    <li th:each="lesson : ${lessons}">
        <span th:text="${lesson.lessonDate}"></span>
        
    </li>
</ul> -->

<div id="calendar"></div>

<!-- ✅ Bootstrap Modal -->

<div class="modal fade" id="lessonModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">


        <form th:action="@{/admin/register}" method="post" th:object="${lessonRegisterForm}" >

            <div class="modal-header">
                <h5 class="modal-title">レッスン登録</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" th:field="*{lessonDate}">
                <input type="hidden" th:field="*{lessonTime}">
                <input type="hidden" th:field="*{reservedCount}">

                <div class="mb-3">
                    <label class="form-label">クラス名</label>
                    <select class="form-select" th:field="*{className}">
                        <option value="幼児">幼児</option>
                        <option value="小学生1-2">小学生1-2</option>
                        <option value="小学生3-4">小学生3-4</option>
                    </select>
                    
                </div>

                <div class="mb-3">
                    <label class="form-label">レベル</label>
                    <select class="form-select" th:field="*{level}">
                        <option value="初級">BEGINNER</option>
                        <option value="中級">INTERMEDIATE</option>
                        <option value="上級">ADVANCED</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">定員</label>
                    <input type="number" th:field="*{capacity}">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}">
                </div>

                

            </div>

            <div class="modal-footer">
                <button type="submit" class="btn btn-primary">登録</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
            </div>

        </form>

    </div>
</div>


</div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
		
		const lessons = /*[[${lessons}]]*/ [];
		console.log("lessons:", lessons);
		
		// const events = lessons.map(l => ({
			// title: l.className,
			// start: l.lessonDate
			//})); 
			const events = lessons.map(l => {
    			const d = l.lessonDate;

    			const dateStr =
        		`${d.year}-${String(d.monthValue).padStart(2,'0')}-${String(d.dayOfMonth).padStart(2,'0')}T` +
        		`${String(d.hour).padStart(2,'0')}:${String(d.minute).padStart(2,'0')}`;

    			return {
        			title: l.className,
        			start: dateStr,
        			//end: new Date(start.getTime() + 30 * 60 * 1000) // 30分追加
    			};
			});
			

        var calendarEl = document.getElementById('calendar');

        var modal = new bootstrap.Modal(document.getElementById('lessonModal'));

        var calendar = new FullCalendar.Calendar(calendarEl, {

            initialView: 'timeGridWeek',
            locale: 'ja',
            // height: 600,
            selectable: true,
            slotDuration: '00:30:00',  // ← 30分刻み
            defaultTimedEventDuration: '00:30:00',


            dateClick: function(info) {
                openModal(info.dateStr);
            },

            events: events
        });

        calendar.render();

        function openModal(dateTimeStr) {
            const date = dateTimeStr.split("T")[0];
            const time = dateTimeStr.split("T")[1]?.substring(0,5);

            document.getElementById("lessonDate").value = date;
            document.getElementById("lessonTime").value = time;

            modal.show(); // ← ここがBootstrap版
        }
    });
</script>

</body>
</html>
