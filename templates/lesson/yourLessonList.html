<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>予約レッスン一覧</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">
	
	<nav class="my-3" style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
                          <ol class="breadcrumb mb-0">
                              <li class="breadcrumb-item"><a th:href="@{/lessons}">空きレッスン一覧</a></li>
                              <li class="breadcrumb-item active" aria-current="page">予約レッスン一覧</li>
                          </ol>
    </nav>

    <!-- タイトル -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">予約レッスン一覧</h2>
    </div>

    <!-- 完了メッセージ -->
    <div th:if="${successMessage}" class="alert alert-success text-center">
        <span th:text="${successMessage}"></span>
    </div>

    <!-- 一覧 -->
    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-striped table-hover text-center align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>予約者</th>
                        <th>レッスン受講者</th>
                        <th>予約日時</th>
                        <th>クラス名</th>
                        <th>レベル</th>
                        <th>詳細</th>
                        <th>キャンセル</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="reservation : ${yourLessonList.content}">
                        <td th:text="${reservation.name}"></td>
                        <td th:text="${reservation.studentName}"></td>
                        <td th:text="${#temporals.format(reservation.dateTime,'yyyy/MM/dd HH:mm')}"></td>
                        <td th:text="${reservation.lesson.className}"></td>
                        <td th:text="${reservation.lesson.level}"></td>
                        
                        <td>
                        <!-- 詳細ボタン -->
                        <button type="button"
        						class="btn btn-primary btn-sm"
        						data-bs-toggle="modal"
        						data-bs-target="#detailModal"
        						
        						th:attr="
        						data-name=${reservation.name},
        						data-student=${reservation.studentName},
        						data-date=${#temporals.format(reservation.dateTime,'yyyy/MM/dd HH:mm')},
        						data-age=${reservation.age},
        						data-history=${reservation.learningHistory},
        						data-request=${reservation.request},
        						data-classname=${reservation.lesson.className},
        						data-level=${reservation.lesson.level}
    						">

    						<i class="bi bi-eye-fill"></i>

						</button>
						</td>

                        <!-- ゴミ箱ボタン -->
                        <td>
                            <button type="button"
                                    class="btn btn-danger btn-sm"
                                    data-bs-toggle="modal"
                                    data-bs-target="#cancelModal"
                                    th:attr="data-id=${reservation.id},
                                             data-name=${reservation.studentName}">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>
    </div>
    
    <!-- 戻るボタン -->
	<div class="text-center mt-4">

    	<a th:href="@{/lessons}"
       	class="btn btn-secondary px-4">

        	<i class="bi bi-arrow-left"></i>
        	前のページへ戻る

    	</a>

	</div>

</div>

<!-- キャンセルモーダル -->
<div class="modal fade" id="cancelModal" tabindex="-1">

    <div class="modal-dialog">
        <div class="modal-content">

            <!-- ヘッダー -->
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">予約キャンセル確認</h5>
                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal"></button>
            </div>

            <!-- 本文 -->
            <div class="modal-body text-center">

                <p class="mb-2">本当にキャンセルしますか？</p>

                <p class="fw-bold text-danger" id="userNameArea"></p>

            </div>

            <!-- フッター -->
            <div class="modal-footer">

                <button type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    戻る
                </button>

                <form th:action="@{/cancelReservation}" method="post">

                    <input type="hidden"
                           name="reservationId"
                           id="deleteId">

                    <button type="submit"
                            class="btn btn-danger">
                        キャンセルする
                    </button>

                </form>

            </div>

        </div>
    </div>

</div>

<!-- 詳細モーダル -->
<div class="modal fade" id="detailModal" tabindex="-1">

    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <!-- ヘッダー -->
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">
                    予約詳細
                </h5>

                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">
                </button>
            </div>

            <!-- 本文 -->
            <div class="modal-body">

                <table class="table">

                    <tr>
                        <th>予約者</th>
                        <td id="detailName"></td>
                    </tr>

                    <tr>
                        <th>レッスン受講者</th>
                        <td id="detailStudent"></td>
                    </tr>
                    
                    <tr>
                        <th>予約日時</th>
                        <td id="detailDate"></td>
                    </tr>
                    
                    <tr>
                        <th>クラス名</th>
                        <td id="detailClassname"></td>
                    </tr>
                    
                    <tr>
                        <th>レベル</th>
                        <td id="detailLevel"></td>
                    </tr>

                    <tr>
                        <th>年齢</th>
                        <td id="detailAge"></td>
                    </tr>

                    <tr>
                        <th>学習歴</th>
                        <td id="detailHistory"></td>
                    </tr>

                    <tr>
                        <th>要望</th>
                        <td id="detailRequest"></td>
                    </tr>
                    

                </table>

            </div>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const cancelModal = document.getElementById('cancelModal');

cancelModal.addEventListener('show.bs.modal', function (event) {

    const button = event.relatedTarget;

    const reservationId = button.getAttribute('data-id');
    const userName = button.getAttribute('data-name');

    document.getElementById('deleteId').value = reservationId;
    document.getElementById('userNameArea').textContent = userName + " さんの予約";
});

const detailModal = document.getElementById('detailModal');

detailModal.addEventListener('show.bs.modal', function (event) {

    const row = event.relatedTarget;

    document.getElementById('detailName').textContent
        = row.getAttribute('data-name');

    document.getElementById('detailStudent').textContent
        = row.getAttribute('data-student');

    document.getElementById('detailAge').textContent
        = row.getAttribute('data-age');

    document.getElementById('detailHistory').textContent
        = row.getAttribute('data-history');

    document.getElementById('detailDate').textContent
        = row.getAttribute('data-date');

    document.getElementById('detailRequest').textContent
        = row.getAttribute('data-request');
        
    document.getElementById('detailClassname').textContent
        = row.getAttribute('data-classname');
        
    document.getElementById('detailLevel').textContent
        = row.getAttribute('data-level');
});
</script>

</body>
</html>
